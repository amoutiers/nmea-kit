name: Publish

on:
  push:
    tags: ["v*"]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Get trusted publishing token
        run: |
          OIDC_TOKEN=$(curl -sS "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=crates.io" \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" | jq -r '.value')
          CRATES_TOKEN=$(curl -sS "https://crates.io/api/v1/trusted_publishing/tokens" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "{\"jwt\": \"${OIDC_TOKEN}\"}" | jq -r '.token')
          echo "CARGO_REGISTRY_TOKEN=${CRATES_TOKEN}" >> "$GITHUB_ENV"
      - run: cargo publish
